name: Deploy Production V2 - AWS

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests with coverage
        run: ./mvnw verify -P prod

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/library-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/library-api:$IMAGE_TAG
          docker tag $ECR_REGISTRY/library-api:$IMAGE_TAG $ECR_REGISTRY/library-api:latest
          docker push $ECR_REGISTRY/library-api:latest
          echo "image=$ECR_REGISTRY/library-api:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            docker pull ${{ needs.build-and-push.outputs.image }}
            
            docker stop library-api || true
            docker rm library-api || true
            
            docker run -d \
              --name library-api \
              --restart always \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL_PROD=${{ secrets.DB_URL_PROD_V2 }} \
              -e DB_USER_PROD=${{ secrets.DB_USER_PROD_V2 }} \
              -e DB_PASSWORD_PROD=${{ secrets.DB_PASSWORD_PROD_V2 }} \
              -e RECEIPTS_SERVICE_URL_PROD=${{ secrets.RECEIPTS_SERVICE_URL_PROD }} \
              ${{ needs.build-and-push.outputs.image }}