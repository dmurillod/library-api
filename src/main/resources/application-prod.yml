spring:
  datasource:
    url: ${DB_URL_PROD}
    username: ${DB_USER_PROD}
    password: ${DB_PASSWORD_PROD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

services:
  receipts:
    url: http://34.61.106.141
  erp:
    url: https://sipsoftware.co/erp/usuarios

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true